<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlashAI — Medicina UNAM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0d0d;color:#f0f0f0;font-family:system-ui,-apple-system,sans-serif;padding:20px}
    .container{max-width:600px;margin:0 auto}
    .card{background:#161616;border:1px solid #222;border-radius:20px;padding:20px;margin-bottom:15px}
    .btn-main{background:#7c3aed;color:#fff;border:none;padding:14px;border-radius:12px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
    .btn-ghost{background:transparent;color:#888;border:1px solid #333;padding:8px 16px;border-radius:10px;cursor:pointer}
    input{width:100%;background:#000;border:1px solid #333;color:#fff;padding:12px;border-radius:10px;margin-top:10px}
    .deck-item{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#1e1e1e;border-radius:12px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
    const [decks, setDecks] = useState(() => {
        const saved = localStorage.getItem("FLASH_DECKS");
        return saved ? JSON.parse(saved) : [];
    });
    const [view, setView] = useState("home");
    const [newDeckName, setNewDeckName] = useState("");
    const [apiKey, setApiKey] = useState(localStorage.getItem("FLASH_AI_KEY") || "");

    useEffect(() => {
        localStorage.setItem("FLASH_DECKS", JSON.stringify(decks));
    }, [decks]);

    const addDeck = () => {
        if (!newDeckName.trim()) return;
        const deck = { id: Date.now(), name: newDeckName, cards: [] };
        setDecks([...decks, deck]);
        setNewDeckName("");
        setView("home");
    };

    return (
        <div className="container">
            <header style={{display:"flex", justifyContent:"space-between", marginBottom:"30px"}}>
                <h1>⚡ FlashAI</h1>
                <button onClick={() => setView("config")} className="btn-ghost">Configurar</button>
            </header>

            {view === "home" && (
                <div>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px"}}>
                        <h2>Mis Mazos</h2>
                        <button onClick={() => setView("create")} className="btn-ghost" style={{borderColor: "#7c3aed", color: "#7c3aed"}}>+ Nuevo</button>
                    </div>
                    
                    {decks.length === 0 ? (
                        <div className="card" style={{textAlign:"center", borderStyle:"dashed"}}>
                            <p style={{color:"#666"}}>No tienes mazos todavía.</p>
                        </div>
                    ) : (
                        decks.map(d => (
                            <div key={d.id} className="deck-item">
                                <span>{d.name}</span>
                                <button className="btn-ghost" style={{fontSize:"12px"}}>Estudiar</button>
                            </div>
                        ))
                    )}
                </div>
            )}

            {view === "create" && (
                <div className="card">
                    <h3>Crear Nuevo Mazo</h3>
                    <input 
                        placeholder="Ej: Anatomía II, Farmacología..." 
                        value={newDeckName}
