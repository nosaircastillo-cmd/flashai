<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlashAI — Repaso espaciado inteligente</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#0d0d0d;color:#f0f0f0;font-family:system-ui,-apple-system,sans-serif}
    input,button,textarea{font-family:inherit}
    .container{max-width:600px;margin:0 auto;padding:20px}
    .card{background:#161616;border:1px solid #222;border-radius:20px;padding:25px;margin-top:20px}
    .btn-primary{background:#7c3aed;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-weight:700;cursor:pointer;width:100%}
    .btn-secondary{background:transparent;color:#888;border:1px solid #333;padding:10px;border-radius:12px;cursor:pointer}
    input{width:100%;background:#000;border:1px solid #333;color:#fff;padding:12px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- Configuración de Estilos Rápidos ---
const ACC = "#7c3aed";
const MT = "#888";

function App() {
    const [view, setView] = useState("home");
    const [apiKey, setApiKey] = useState(localStorage.getItem("FLASH_AI_KEY") || "");
    const [showModal, setShowModal] = useState(false);

    const saveKey = (key) => {
        localStorage.setItem("FLASH_AI_KEY", key);
        setApiKey(key);
        setShowModal(false);
    };

    return (
        <div className="container">
            <nav style={{display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:"20px", borderBottom:"1px solid #222"}}>
                <h2 style={{fontSize:"1.5rem"}}>⚡ FlashAI</h2>
                <button onClick={() => setShowModal(true)} className="btn-secondary">
                    {apiKey ? "API Activa" : "Configurar API"}
                </button>
            </nav>

            {view === "home" && (
                <div className="card">
                    <h3 style={{marginBottom:"15px"}}>Mis Mazos de Medicina</h3>
                    <div style={{background:"#000", padding:"20px", borderRadius:"15px", border:"1px dashed #333", textAlign:"center"}}>
                        <p style={{color:MT}}>No hay mazos activos.</p>
                        <button className="btn-primary" style={{marginTop:"15px"}}>+ Crear con Nosa-CARDS Engine</button>
                    </div>
                </div>
            )}

            {showModal && (
                <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", zIndex:100}}>
                    <div className="card" style={{width:"100%", maxWidth:"400px"}}>
                        <h3>Configuración IA</h3>
                        <p style={{color:MT, fontSize:"13px", margin:"10px 0 20px"}}>Introduce tu clave de Anthropic o Gemini para habilitar el análisis de respuestas.</p>
                        <input 
                            type="password" 
                            placeholder="sk-..." 
                            defaultValue={apiKey}
                            onBlur={(e) => saveKey(e.target.value)}
                        />
                        <button onClick={() => setShowModal(false)} className="btn-primary">Listo</button>
                    </div>
                </div>
            )}

            <footer style={{marginTop:"40px", textAlign:"center", fontSize:"12px", color:"#444"}}>
                UNAM Medicina • Optimizado para Anki & FLAC
            </footer>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
