/* ── SM-2 ─────────────────────────────────────────────────────────────────── */
function sm2(card,q,p){
  let{interval:iv=1,repetitions:rp=0,easeFactor:ef=p.ease}=card;
  const[g1,g4]=p.g;
  if(q===0){iv=g1;rp=0;ef=Math.max(1.3,ef-.2);}
  else if(q===1){iv=Math.max(g1,Math.round(iv*1.2));ef=Math.max(1.3,ef-.15);rp=Math.max(1,rp);}
  else if(q===2){iv=rp===0?g1:rp===1?g4:Math.min(Math.round(iv*ef),p.maxI);rp++;}
  else{iv=rp===0?Math.ceil(g1*1.5):rp===1?Math.ceil(g4*1.3):Math.min(Math.round(iv*ef*1.3),p.maxI);ef=Math.min(3,ef+.15);rp++;}
  iv=Math.max(g1,iv);
  const d=new Date();d.setDate(d.getDate()+iv);
  return{interval:iv,repetitions:rp,easeFactor:ef,dueDate:d.toISOString()};
}
const isDue=c=>!c.dueDate||new Date(c.dueDate)<=new Date();
const nxtL=(c,q,p)=>{const r=sm2(c,q,p);return r.interval<1?`<${Math.round(r.interval*24*60)}m`:r.interval<2?"~1d":`~${Math.round(r.interval)}d`;};

/* ── Parsers / helpers ────────────────────────────────────────────────────── */
function parseTxt(txt){
  const cards=[],lines=txt.trim().split("\n");
  for(let i=0;i<lines.length;i++){
    const l=lines[i].trim();if(!l)continue;
    if(/^[QPqp]:/.test(l)){const f=l.replace(/^[QPqp]:\s*/,""),n=lines[i+1]?.trim()||"";if(/^[ARar]:/.test(n)){cards.push({front:f,back:n.replace(/^[ARar]:\s*/,"")});i++;continue;}}
    const sep=l.includes("\t")?"\t":l.includes(";")?";":l.includes("|")?"|":null;
    if(sep){const[f,...b]=l.split(sep);if(f&&b.length)cards.push({front:f.trim(),back:b.join(sep).trim()});}
  }
  return cards;
}
async function compressImg(url){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{const sc=Math.min(1,800/img.width),c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",.72));};
    img.onerror=()=>res(url);img.src=url;
  });
}
function hashPin(pin){let h=5381;for(let i=0;i<pin.length;i++)h=((h<<5)+h)+pin.charCodeAt(i);return(h>>>0).toString(36);}
const uid=()=>`${Date.now()}_${Math.random().toString(36).slice(2)}`;
const fmt=d=>new Date(d).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});
function calcExam(cards,examDate,p){
  const t=new Date();t.setHours(0,0,0,0);const e=new Date(examDate);e.setHours(23,59,59,0);
  const dL=Math.max(1,Math.ceil((e-t)/86400000)),tot=cards.length;
  const mst=cards.filter(c=>c.repetitions>=3&&!isDue(c)).length;
  const pct=tot?Math.round(mst/tot*100):0;
  const due=cards.filter(c=>!c.dueDate||new Date(c.dueDate)<=e).length;
  return{dL,tot,mst,pct,dt:Math.max(1,Math.ceil(due/dL)),conf:Math.min(100,Math.round(pct*.7+Math.min(30,dL)))};
}

/* ── Smart local evaluator (no API needed) ────────────────────────────────── */
function localEval(student, correct, question, noApiKey){
  const s=student.trim().toLowerCase().replace(/\s+/g," ");
  const c=correct.trim().toLowerCase().replace(/\s+/g," ");
  const source=noApiKey?"(evaluación local — configura IA para mejor análisis)":"(sin conexión — evaluación local)";

  // Exact match
  if(s===c)return{missed:"",didWell:"¡Respuesta exactamente correcta!",suggestion:3,local:true};

  // Normalize: remove spaces around operators for math
  const norm=t=>t.replace(/\s*([\+\-\=\*\/\^])\s*/g,"$1");
  if(norm(s)===norm(c))return{missed:"",didWell:"¡Correcto! (diferencia solo en espacios)",suggestion:3,local:true};

  // Character-level similarity (good for formulas/short answers)
  function similarity(a,b){
    if(!a||!b)return 0;
    const longer=a.length>b.length?a:b;
    const shorter=a.length>b.length?b:a;
    if(longer.length===0)return 1;
    let matches=0;
    for(let i=0;i<shorter.length;i++)if(longer.includes(shorter[i]))matches++;
    return matches/longer.length;
  }
  const charSim=similarity(norm(s),norm(c));

  // Check if student answer is a subset (got the start right, missed the end)
  const isPrefix=norm(c).startsWith(norm(s));
  const isSuffix=norm(c).endsWith(norm(s));
  const isContained=norm(c).includes(norm(s));

  // Word-level overlap for longer answers
  const sw=s.split(/[\s,;]+/).filter(w=>w.length>1);
  const cw=c.split(/[\s,;]+/).filter(w=>w.length>1);
  const matchedW=cw.filter(w=>s.includes(w));
  const wordScore=cw.length>0?matchedW.length/cw.length:0;

  // Find what's missing (characters/parts in correct but not in student answer)
  const missingParts=[];
  if(isPrefix){
    const missing=correct.trim().slice(student.trim().length).trim();
    if(missing)missingParts.push(`Te faltó completar: "…${missing}"`);
  }

  const score=Math.max(charSim,wordScore);

  if(score>=0.95){
    return{missed:`Casi perfecta, pequeña diferencia. Correcta: "${correct}" ${source}`,didWell:"Respuesta casi idéntica a la correcta.",suggestion:2,local:true};
  } else if(score>=0.7||isContained){
    const msg=missingParts.length?missingParts[0]:`Tu respuesta está incompleta. Correcta: "${correct}"`;
    return{missed:`${msg} ${source}`,didWell:"Captaste la idea principal.",suggestion:2,local:true};
  } else if(score>=0.4||isPrefix||isSuffix){
    return{missed:`Respuesta parcial. Correcta: "${correct}" ${source}`,didWell:matchedW.length>0?`Acertaste: ${matchedW.slice(0,3).join(", ")}`:undefined,suggestion:1,local:true};
  } else if(score>=0.2){
    return{missed:`Respuesta incorrecta o muy incompleta. Correcta: "${correct}" ${source}`,didWell:"",suggestion:0,local:true};
  } else {
    return{missed:`Respuesta incorrecta. La correcta es: "${correct}" ${source}`,didWell:"",suggestion:0,local:true};
  }
}

  async function showAns(){

    setEvalL(true);setEvalR(null);
    const ha=ans.trim().length>0;
    if(!ha){setEvalR({missed:`Respuesta correcta: ${card.back||"—"}`,didWell:"",suggestion:0});setEvalL(false);return;}
    if(!apiKey){
      setEvalR(localEval(ans.trim(), card.back||"", card.front||"", true));
      setEvalL(false);return;
    }
    try{
      let aiText="";
      const prompt=`Evalúa la respuesta del estudiante. Devuelve SOLO JSON sin texto extra.\n\nP: ${card.front}\nCorrecta: ${card.back}\nEstudiante: ${ans.trim()}\n\nRegla estricta: incorrecta=0, parcial=1, correcta=2, perfecta=3.\n{"missed":"","didWell":"","suggestion":0}`;

      if(apiProvider==="gemini"){
        // Try models in order until one works
        const models=["gemini-2.0-flash","gemini-1.5-flash","gemini-1.5-flash-latest","gemini-pro"];
        let lastErr=null;
        for(const model of models){
          try{
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
              method:"POST",headers:{"Content-Type":"application/json"},
              body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:300,temperature:0.1}})
            });
            const data=await res.json();
            if(data.error){lastErr=data.error.message||data.error.status;continue;}
            aiText=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
            if(aiText)break;
          }catch(e){lastErr=e.message;continue;}
        }
        if(!aiText&&lastErr)throw new Error("Gemini: "+lastErr);
      } else {
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:250,messages:[{role:"user",content:prompt}]})
        });
        const data=await res.json();
        if(data.error)throw new Error("Anthropic: "+data.error.message);
        aiText=data.content?.map(b=>b.text||"").join("")||"";
      }

      const match=aiText.trim().match(/\{[\s\S]*?\}/);
      if(!match)throw new Error("no json");
      const parsed=JSON.parse(match[0]);
      if(typeof parsed.suggestion!=="number")throw new Error("bad");
      setEvalR(parsed);
    }catch{
      setEvalR(localEval(ans.trim(), card.back||"", card.front||"", false));
    }
    setEvalL(false);
  }

          <input type="file" accept=".pdf,.docx,.txt,.pptx,.png,.jpg" style={{...S.inp,padding:"6px 10px",cursor:"pointer"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;if(!docN)setDocN(f.name);setDocM({name:f.name,size:f.size,type:f.type,added:new Date().toISOString()});}}/>
          {docM&&<div style={{background:"#111",borderRadius:"8px",padding:"8px 12px",marginTop:"8px",fontSize:"11px",color:MT,display:"flex",gap:"8px",alignItems:"center"}}><span>📄</span><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{docM.name}</span><span>{(docM.size/1024).toFixed(0)} KB</span><button onClick={()=>setDocM(null)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"12px"}}>×</button></div>}
          <div style={{display:"flex",gap:"8px",marginTop:"16px",justifyContent:"flex-end"}}>
            <button style={S.bs} onClick={()=>setModal(null)}>Cancelar</button>
            <button style={S.bp(dc)} onClick={saveDoc}>Guardar</button>
          </div>
        </div>
      </div>}
      {modal==="nt"&&<div style={S.ov} onClick={e=>e.target===e.currentTarget&&setModal(null)}><div style={S.mo(360)}><h2 style={{margin:"0 0 16px",fontSize:"17px",fontWeight:"800"}}>Nuevo topic</h2><div style={S.lbl}>NOMBRE</div><input style={S.inp} autoFocus placeholder="Ej: Anatomía Uterina..." value={ntN} onChange={e=>setNtN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTopic()}/><div style={{display:"flex",gap:"8px",marginTop:"18px",justifyContent:"flex-end"}}><button style={S.bs} onClick={()=>setModal(null)}>Cancelar</button><button style={S.bp(dc)} onClick={addTopic}>Crear</button></div></div></div>}
      {modal==="ns"&&<div style={S.ov} onClick={e=>e.target===e.currentTarget&&setModal(null)}><div style={S.mo(360)}><h2 style={{margin:"0 0 4px",fontSize:"17px",fontWeight:"800"}}>Nuevo subtopic</h2><p style={{color:MT,fontSize:"11px",margin:"0 0 14px"}}>en: {topics.find(t=>t.id===sP)?.name}</p><div style={S.lbl}>NOMBRE</div><input style={S.inp} autoFocus placeholder="Ej: Miomas submucosos..." value={nsN} onChange={e=>setNsN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSub()}/><div style={{display:"flex",gap:"8px",marginTop:"18px",justifyContent:"flex-end"}}><button style={S.bs} onClick={()=>setModal(null)}>Cancelar</button><button style={S.bp(dc)} onClick={addSub}>Crear</button></div></div></div>}
      {modal==="card"&&<div style={S.ov} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={S.mo(500)}>
          <h2 style={{margin:"0 0 16px",fontSize:"17px",fontWeight:"800"}}>{editC?"Editar tarjeta":"Nueva tarjeta"}</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
            <div><div style={S.lbl}>TOPIC</div><select style={S.sel} value={cT} onChange={e=>{setCT(e.target.value);setCS("");}}><option value="">Sin topic</option>{topics.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
            <div><div style={S.lbl}>SUBTOPIC</div><select style={{...S.sel,opacity:cT?1:.4}} value={cS} onChange={e=>setCS(e.target.value)} disabled={!cT}><option value="">Sin subtopic</option>{tSubs(cT).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
          </div>
          <div style={{marginBottom:"9px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}><span style={{...S.lbl,color:dc}}>▲ FRENTE</span><label style={{cursor:"pointer",fontSize:"10px",color:"#666",background:"#181818",padding:"3px 9px",borderRadius:"5px",border:"1px solid #282828"}}>🖼 {cfI?"Cambiar":"Foto"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>hImg(e,"f")}/></label></div>
            <div style={{background:"#0f0f0f",borderRadius:"10px",padding:"10px",border:"1px solid #252525"}}>
              {cfI&&<div style={{position:"relative",display:"inline-block",marginBottom:"6px"}}><img src={cfI} alt="" style={{maxHeight:"75px",maxWidth:"100%",borderRadius:"7px",objectFit:"contain"}}/><button onClick={()=>setCfI(null)} style={{position:"absolute",top:"2px",right:"2px",background:"rgba(0,0,0,.8)",color:"#fff",border:"none",borderRadius:"50%",width:"16px",height:"16px",cursor:"pointer",fontSize:"9px",lineHeight:"16px",textAlign:"center",padding:0}}>×</button></div>}
              <textarea style={{...S.ta,minHeight:"44px"}} placeholder="Pregunta..." value={cf} onChange={e=>setCf(e.target.value)}/>
            </div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}><span style={{...S.lbl,color:"#4ade80"}}>▼ REVERSO</span><label style={{cursor:"pointer",fontSize:"10px",color:"#666",background:"#181818",padding:"3px 9px",borderRadius:"5px",border:"1px solid #282828"}}>🖼 {cbI?"Cambiar":"Foto"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>hImg(e,"b")}/></label></div>
            <div style={{background:"#0f0f0f",borderRadius:"10px",padding:"10px",border:"1px solid #252525"}}>
              {cbI&&<div style={{position:"relative",display:"inline-block",marginBottom:"6px"}}><img src={cbI} alt="" style={{maxHeight:"75px",maxWidth:"100%",borderRadius:"7px",objectFit:"contain"}}/><button onClick={()=>setCbI(null)} style={{position:"absolute",top:"2px",right:"2px",background:"rgba(0,0,0,.8)",color:"#fff",border:"none",borderRadius:"50%",width:"16px",height:"16px",cursor:"pointer",fontSize:"9px",lineHeight:"16px",textAlign:"center",padding:0}}>×</button></div>}
              <textarea style={{...S.ta,minHeight:"44px"}} placeholder="Respuesta..." value={cb} onChange={e=>setCb(e.target.value)}/>
            </div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"14px",justifyContent:"flex-end"}}>
            <button style={S.bs} onClick={()=>{setModal(null);setEditC(null);}}>Cancelar</button>
            <button style={{...S.bp(dc),opacity:(!cf.trim()&&!cfI)?.4:1}} onClick={saveCard}>{editC?"Guardar":"Añadir"}</button>
          </div>
        </div>
      </div>}
      {modal==="imp"&&<div style={S.ov} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={S.mo(500)}>
          <h2 style={{margin:"0 0 4px",fontSize:"17px",fontWeight:"800"}}>Importar .txt</h2>
          <p style={{color:MT,fontSize:"11px",margin:"0 0 10px"}}>Q:/A: · separado por ; | o tab</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
            <div><div style={S.lbl}>TOPIC</div><select style={S.sel} value={impT} onChange={e=>{setImpT(e.target.value);setImpS("");}}><option value="">Sin topic</option>{topics.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
            <div><div style={S.lbl}>SUBTOPIC</div><select style={{...S.sel,opacity:impT?1:.4}} value={impS} onChange={e=>setImpS(e.target.value)} disabled={!impT}><option value="">Sin subtopic</option>{tSubs(impT).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
          </div>
          <div style={S.lbl}>ARCHIVO .TXT</div>
          <input type="file" accept=".txt,.csv" style={{...S.inp,padding:"6px 10px",cursor:"pointer"}} onChange={e=>{const f=e.target.files?.[0];if(f){const r=new FileReader();r.onload=ev=>setImpTxt(ev.target.result);r.readAsText(f,"UTF-8");}}}/>
          <div style={{...S.lbl,marginTop:"10px"}}>O PEGAR TEXTO</div>
          <textarea style={{...S.inp,marginTop:"5px",minHeight:"90px",resize:"vertical",fontFamily:"monospace",fontSize:"12px",lineHeight:1.6}} placeholder={"Q: ¿Qué son los miomas?\nA: Tumores benignos del músculo liso"} value={impTxt} onChange={e=>setImpTxt(e.target.value)}/>
          <div style={{fontSize:"11px",marginTop:"5px",color:pc>0?"#4ade80":MT}}>{pc>0?`✓ ${pc} tarjeta${pc!==1?"s":""} detectada${pc!==1?"s":""}` :"Pega texto para previsualizar"}</div>
          <div style={{display:"flex",gap:"8px",marginTop:"12px",justifyContent:"flex-end"}}>
            <button style={S.bs} onClick={()=>setModal(null)}>Cancelar</button>
            <button style={{...S.bp(dc),opacity:pc?1:.35}} onClick={doImport}>Importar{pc>0?` (${pc})`:""}</button>
          </div>
        </div>
      </div>}
    </div>
  );

  /* ── STUDY ── */
  if(view==="study"){
    if(queue.length===0)return<div style={S.app}><Nav left={<button style={S.gh} onClick={()=>setView("deck")}>← {deck?.name}</button>}/><div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 52px)",padding:"32px",textAlign:"center"}}><div style={{fontSize:"44px",marginBottom:"14px"}}>✅</div><h2 style={{fontSize:"21px",fontWeight:"800",margin:"0 0 6px"}}>Sin pendientes hoy</h2><p style={{color:MT,margin:"0 0 22px",fontSize:"13px"}}>Todas las tarjetas están al día</p><button style={S.bs} onClick={()=>setView("deck")}>Volver al mazo</button></div></div>;
    if(done)return<div style={S.app}><Nav left={<button style={S.gh} onClick={()=>setView("deck")}>← {deck?.name}</button>}/><div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 52px)",padding:"32px",textAlign:"center"}}><div style={{fontSize:"52px",marginBottom:"16px"}}>🎉</div><h2 style={{fontSize:"24px",fontWeight:"900",margin:"0 0 5px"}}>¡Sesión completada!</h2><p style={{color:MT,margin:"0 0 22px",fontSize:"13px"}}>Revisaste {queue.length} tarjeta{queue.length!==1?"s":""}</p>{exP&&<div style={{background:"#0d1117",border:"1px solid #1f2937",borderRadius:"16px",padding:"16px 20px",marginBottom:"20px",width:"100%",maxWidth:"320px"}}><div style={{fontSize:"11px",color:"#818cf8",fontWeight:"700",marginBottom:"10px"}}>Progreso hacia el examen</div><div style={{display:"flex",justifyContent:"space-around"}}><Circ pct={exP.pct} color="#818cf8" label={`${exP.mst}/${exP.tot}`} sub="dominadas"/><Circ pct={exP.conf} color="#4ade80" label={`${exP.dL}d`} sub="restantes"/></div></div>}<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"22px",width:"100%",maxWidth:"360px"}}>{[["De nuevo",stats.again,"#ef4444"],["Difícil",stats.hard,"#f97316"],["Bien",stats.good,"#22c55e"],["Fácil",stats.easy,"#3b82f6"]].map(([l,n,c])=><div key={l} style={{background:CB,borderRadius:"11px",padding:"12px 5px"}}><div style={{fontSize:"22px",fontWeight:"900",color:c}}>{n}</div><div style={{fontSize:"10px",color:MT,marginTop:"3px"}}>{l}</div></div>)}</div><div style={{display:"flex",gap:"9px"}}><button style={S.bs} onClick={()=>setView("deck")}>Ver mazo</button><button style={S.bp(dc)} onClick={()=>startStudy(scope)}>Repetir</button></div></div></div>;

    const BTNS=[{l:"De nuevo",q:0,bg:"#c0392b",acc:"#ff6b6b"},{l:"Difícil",q:1,bg:"#7d5a00",acc:"#ffc107"},{l:"Bien",q:2,bg:"#1a6b3a",acc:"#2ecc71"},{l:"Fácil",q:3,bg:"#0d4f8a",acc:"#3498db"}];
    const sugI=evalR?.suggestion??null;
    return(
      <div style={S.app}>
        <nav style={S.nav}>
          <button style={S.gh} onClick={()=>setView("deck")}>← {deck?.name}</button>
          <div style={{color:MT,fontSize:"12px",fontWeight:"600"}}>{qIdx+1} / {queue.length}</div>
          <div style={{display:"flex",gap:"5px",fontSize:"11px"}}>
            {[["Nuevas",scoped.filter(c=>!c.repetitions).length,"#3b82f6"],["Revisar",scoped.filter(c=>c.repetitions>0&&isDue(c)).length,"#f59e0b"],["Quedan",queue.length-qIdx,"#a78bfa"]].map(([l,n,c])=>(
              <span key={l} style={{background:"#1a1a1a",padding:"2px 6px",borderRadius:"5px",color:c,fontWeight:"700"}}>{n} {l}</span>
            ))}
          </div>
        </nav>
        <div style={{height:"3px",background:"#1a1a1a"}}><div style={{height:"100%",background:dc,width:`${prog*100}%`,transition:"width .4s ease"}}/></div>
        <div style={{maxWidth:"640px",margin:"0 auto",padding:"0 0 140px"}}>
          {(card?.topicId||card?.subtopicId)&&<div style={{display:"flex",gap:"5px",padding:"10px 16px 0",flexWrap:"wrap"}}>{card.topicId&&<Tag color="#a78bfa" bg="#1e1a2e">{tLbl(card)}</Tag>}{card.subtopicId&&<Tag color="#93c5fd" bg="#1a1e2e">{sLbl(card)}</Tag>}</div>}
          <div style={{margin:"10px 16px 0",background:CB,borderRadius:"16px",border:`1px solid ${BR}`,overflow:"hidden"}}>
            {!card?.repetitions&&<div style={{padding:"10px 16px 0"}}><span style={{background:"#1d4ed8",color:"#bfdbfe",fontSize:"11px",fontWeight:"700",padding:"3px 10px",borderRadius:"6px"}}>Nueva</span></div>}
            <div style={{padding:"14px 18px 16px"}}>{card?.frontImg&&<img src={card.frontImg} alt="" style={{maxWidth:"100%",maxHeight:"140px",borderRadius:"10px",objectFit:"contain",marginBottom:"10px",display:"block"}}/>}{card?.front&&<div style={{fontSize:"17px",fontWeight:"700",color:TX,lineHeight:1.45}}>{card.front}</div>}</div>
            {flipped&&<><div style={{borderTop:`1px solid ${BR}`,height:"1px"}}/><div style={{padding:"14px 18px"}}>{card?.backImg&&<img src={card.backImg} alt="" style={{maxWidth:"100%",maxHeight:"140px",borderRadius:"10px",objectFit:"contain",marginBottom:"10px",display:"block"}}/>}{card?.back&&<div style={{fontSize:"15px",color:"#d1d5db",lineHeight:1.55}}>{card.back}</div>}</div></>}
          </div>
          {flipped&&<div style={{margin:"8px 16px 0"}}>{evalL&&<div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"12px 14px",fontSize:"13px",color:"#6b7280"}}>✦ Analizando tu respuesta...</div>}{evalR&&<div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
            {evalR.local&&<div style={{background:"#1a1a0a",border:"1px solid #3a3a10",borderRadius:"8px",padding:"6px 12px",fontSize:"11px",color:"#888",display:"flex",alignItems:"center",gap:"6px"}}>
              <span>⚠️</span>
              <span>{apiKey?"Error de conexión con la IA — usando evaluación local":"Sin API key — usando evaluación local básica"}</span>
              <button onClick={()=>setShowApiModal(true)} style={{background:"#2a2a10",border:"1px solid #4a4a20",borderRadius:"5px",padding:"2px 8px",cursor:"pointer",fontSize:"10px",color:"#fbbf24",marginLeft:"auto"}}>Configurar IA</button>
            </div>}
            {evalR.missed&&<div style={{background:"#1a0808",border:"1px solid #4a1010",borderRadius:"12px",padding:"11px 13px"}}><span style={{background:"#ef4444",color:"#fff",fontSize:"10px",fontWeight:"700",padding:"2px 8px",borderRadius:"5px"}}>✗ Lo que te faltó</span><div style={{fontSize:"13px",color:"#fca5a5",lineHeight:1.6,marginTop:"6px"}}>{evalR.missed}</div></div>}
            {evalR.didWell&&<div style={{background:"#081a0e",border:"1px solid #104a22",borderRadius:"12px",padding:"11px 13px"}}><span style={{background:"#22c55e",color:"#fff",fontSize:"10px",fontWeight:"700",padding:"2px 8px",borderRadius:"5px"}}>✓ Lo que hiciste bien</span><div style={{fontSize:"13px",color:"#86efac",lineHeight:1.6,marginTop:"6px"}}>{evalR.didWell}</div></div>}
          </div>}</div>}
          {!flipped?<div style={{margin:"10px 16px 0"}}><div style={{background:"#101010",borderRadius:"14px",border:"1px solid #2a2a2a",overflow:"hidden"}}><textarea style={{...S.ta,padding:"13px 15px",minHeight:"78px",fontSize:"14px",display:"block"}} placeholder="Escribe tu respuesta aquí... (opcional)" value={ans} onChange={e=>setAns(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))showAns();}}/><div style={{borderTop:"1px solid #1e1e1e",padding:"6px 13px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:"10px",color:"#2e2e2e"}}>Ctrl+↩ para revelar</span><span style={{fontSize:"10px",color:"#3a3a3a"}}>{ans.length>0?`${ans.length} car.`:"Puedes dejarlo vacío"}</span></div></div></div>
            :(ans.trim()&&<div style={{margin:"8px 16px 0",background:"#0d0d10",border:"1px solid #1e1e2e",borderRadius:"12px",padding:"10px 13px"}}><div style={{fontSize:"10px",color:"#444",fontWeight:"700",letterSpacing:".08em",marginBottom:"4px"}}>TU RESPUESTA</div><div style={{fontSize:"13px",color:"#8b8b9e",lineHeight:1.5}}>{ans}</div></div>)}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(13,13,13,.97)",borderTop:`1px solid ${BR}`,padding:"10px 16px 20px",backdropFilter:"blur(12px)"}}>
          {!flipped?<button onClick={showAns} style={{width:"100%",background:"#e91e63",color:"#fff",border:"none",borderRadius:"14px",padding:"15px",fontSize:"16px",fontWeight:"800",cursor:"pointer"}}>Mostrar respuesta ___</button>:(
            <>
              <div style={{textAlign:"center",fontSize:"11px",color:MT,marginBottom:"7px"}}>{evalL?<span style={{color:"#444"}}>✦ IA analizando...</span>:evalR?<span>IA sugiere: <b style={{color:TX}}>{LBLS[evalR.suggestion]}</b></span>:null}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {BTNS.map(({l,q,bg,acc})=>{const isSug=sugI===q&&evalR&&!evalL;return(
                  <button key={q} onClick={()=>review(q)} style={{background:bg,color:"#fff",border:isSug?`2px solid ${acc}`:"2px solid transparent",borderRadius:"14px",padding:"12px 6px",fontWeight:"800",cursor:"pointer",fontSize:"14px",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",boxShadow:isSug?`0 0 12px ${acc}44`:"none",position:"relative"}}>
                    {isSug&&<span style={{position:"absolute",top:"-8px",right:"8px",background:acc,color:"#000",fontSize:"8px",fontWeight:"900",padding:"2px 6px",borderRadius:"4px"}}>IA ★</span>}
                    <span>{l}</span><span style={{fontSize:"10px",opacity:.65,fontWeight:"600"}}>{nxtL(card,q,ap)}</span>
                  </button>
                );})}
              </div>
            </>
          )}
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
