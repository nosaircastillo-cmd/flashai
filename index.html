<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>FlashAI — Repaso Espaciado</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0d0d0d; 
            color: #f0f0f0; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #161616;
            border: 1px solid #222;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #6d28d9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [status, setStatus] = useState("Iniciando...");

            useEffect(() => {
                setStatus("¡Sistema Listo!");
            }, []);

            return (
                <div className="card">
                    <h1>⚡ FlashAI</h1>
                    <p style={{ color: "#888", marginTop: "10px" }}>{status}</p>
                    <div style={{ marginTop: "20px", textAlign: "left" }}>
                        <p>Estado del sistema:</p>
                        <ul style={{ marginLeft: "20px", fontSize: "14px", color: "#aaa" }}>
                            <li>React 18: Online</li>
                            <li>Babel Compiler: Online</li>
                            <li>Storage: Conectado</li>
                        </ul>
                    </div>
                    <button onClick={() => alert("¡Funciona!")}>Probar Interacción</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
